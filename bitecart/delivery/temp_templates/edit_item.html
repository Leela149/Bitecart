<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteCart Admin - Edit Menu Item</title>
    {% load static %}
    <link href="{% static 'css/global.css' %}" rel="stylesheet">
    <link href="{% static 'css/landing.css' %}" rel="stylesheet">
</head>
<body>

    <!-- 🧭 Navigation Bar -->
    <header class="navbar">
        <a href="/" class="brand">
            <span>🍕</span> BiteCart Admin
        </a>
        <a href="{% url 'open_update_menu' item.restaurant.id %}" class="back-link" style="text-decoration: none; color: var(--text-muted); font-weight: 500;">
            ← Back to Menu
        </a>
    </header>

    <main class="auth-container">
        <div class="auth-card glass-card" style="max-width: 500px; margin-top: 40px;">
            <h2>✏️ Edit Menu Item</h2>
            <form action="{% url 'edit_item' item.id %}" method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label" for="name">Item Name</label>
                    <input type="text" id="name" name="name" class="form-input" value="{{ item.name }}" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="description">Description</label>
                    <textarea id="description" name="description" class="form-input" style="min-height: 100px;" required>{{ item.description }}</textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="price">Price (₹)</label>
                    <input type="number" id="price" name="price" step="0.01" class="form-input" value="{{ item.price }}" required>
                </div>
                
                <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 25px;">
                    <input type="checkbox" id="vegetarian" name="vegetarian" style="transform: scale(1.3); cursor: pointer;" {% if item.vegeterian %}checked{% endif %}>
                    <label for="vegetarian" style="font-weight: 600; cursor: pointer; color: var(--text-dark); margin: 0;">Vegetarian Item</label>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="picture">Image URL</label>
                    <input type="url" id="picture" name="picture" class="form-input" value="{{ item.picture }}">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Update Item</button>
            </form>
        </div>
    </main>

</body>
</html>
