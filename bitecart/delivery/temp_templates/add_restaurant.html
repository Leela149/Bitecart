<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteCart Admin - Add Restaurant</title>
    {% load static %}
    <link href="{% static 'css/global.css' %}" rel="stylesheet">
    <link href="{% static 'css/landing.css' %}" rel="stylesheet">
</head>
<body>

    <!-- 🧭 Navigation Bar -->
    <header class="navbar">
        <a href="/" class="brand">
            <span>🍕</span> BiteCart Admin
        </a>
        <a href="javascript:history.back()" class="back-link" style="text-decoration: none; color: var(--text-muted); font-weight: 500;">
            ← Back to Dashboard
        </a>
    </header>

    <main class="auth-container">
        <div class="auth-card glass-card" style="max-width: 500px;">
            <h2>🍜 Add Restaurant</h2>
            <form action="{% url 'add_restaurant' %}" method ="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label" for="name">Restaurant Name</label>
                    <input type="text" id="name" name="name" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="picture">Picture URL</label>
                    <input type="url" id="picture" name="picture" class="form-input" placeholder="https://example.com/image.jpg" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="cuisine">Cuisine</label>
                    <input type="text" id="cuisine" name="cuisine" class="form-input" placeholder="Italian, Chinese, Fast Food" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="rating">Rating (0 - 5)</label>
                    <input type="number" id="rating" name="rating" class="form-input" min="0" max="5" step="0.1" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Add Restaurant</button>
            </form>
        </div>
    </main>

</body>
</html>
